<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta
      name="description"
      content="Spin the wheel for exclusive discounts and gifts. Enter your Instagram username — one spin per day."
    />
    <meta property="og:title" content="Spin the Wheel — Exclusive Rewards" />
    <meta property="og:description" content="One spin per day. Real rewards — unlock your code and DM us on Instagram." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Spin the Wheel — Exclusive Rewards</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <div class="lux-bg" aria-hidden="true">
      <div class="lux-rays"></div>
      <canvas id="bgParticles" class="lux-particles" width="400" height="800"></canvas>
      <div class="lux-noise"></div>
    </div>

    <main class="shell" id="mainShell">
      <section class="hero">
        <h1 class="title">Spin the Wheel</h1>
        <p class="subtitle">
          One spin per day. Enter your Instagram username to play — rewards are real.
        </p>
      </section>

      <section class="entry card-glow" aria-label="Instagram username">
        <label class="field-label" for="igUser">Instagram username</label>
        <div class="field-row">
          <span class="at-prefix" aria-hidden="true">@</span>
          <input
            id="igUser"
            name="instagram"
            type="text"
            inputmode="text"
            autocomplete="username"
            maxlength="30"
            placeholder="your.handle"
            autocapitalize="none"
            spellcheck="false"
          />
        </div>
        <p class="hint" id="fieldHint">Use the same handle you’ll DM from.</p>
        <p class="error" id="formError" role="alert" hidden></p>
        <button type="button" class="btn-spin" id="spinBtn">
          <span class="btn-spin__glow"></span>
          <span class="btn-spin__label">Spin</span>
        </button>
      </section>

      <section class="wheel-section" aria-label="Prize wheel">
        <div class="wheel-frame card-glow">
          <div class="wheel-pointer" aria-hidden="true">
            <svg class="wheel-pointer__svg" viewBox="0 0 56 80" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="ptrGold" x1="28" y1="0" x2="28" y2="72" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#FFFBEB" />
                  <stop offset="0.35" stop-color="#FDE047" />
                  <stop offset="0.55" stop-color="#CA8A04" />
                  <stop offset="1" stop-color="#713F12" />
                </linearGradient>
                <linearGradient id="ptrChrome" x1="0" y1="0" x2="56" y2="0" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#94A3B8" />
                  <stop offset="0.5" stop-color="#F8FAFC" />
                  <stop offset="1" stop-color="#64748B" />
                </linearGradient>
              </defs>
              <path
                d="M28 4 L52 58 Q28 72 28 72 Q28 72 4 58 Z"
                fill="url(#ptrGold)"
                stroke="url(#ptrChrome)"
                stroke-width="2.5"
              />
              <path d="M28 14 L42 52 Q28 60 28 60 Q28 60 14 52 Z" fill="rgba(255,255,255,0.25)" />
            </svg>
          </div>
          <div class="wheel-stage">
            <div class="wheel-wrap">
              <div class="wheel" id="wheel" aria-hidden="true">
                <div class="wheel-disk" aria-hidden="true"></div>
                <ul class="wheel-labels" id="wheelLabels" aria-hidden="true"></ul>
                <div class="wheel-hub" aria-hidden="true"></div>
              </div>
            </div>
          </div>
        </div>
        <p class="suspense" id="suspenseText" aria-live="polite"></p>
      </section>

      <footer class="foot">
        <a class="admin-link" href="/admin.html">Admin</a>
      </footer>
    </main>

    <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>

    <div class="modal-backdrop" id="modalBackdrop" hidden>
      <div
        class="modal card-glow"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
        id="resultModal"
      >
        <p class="modal-kicker" id="modalTitle">You unlocked</p>
        <p class="modal-reward" id="modalReward"></p>
        <div class="coupon-block">
          <p class="coupon-label">Your code</p>
          <div class="coupon-row">
            <code class="coupon-code" id="modalCoupon"></code>
            <button type="button" class="btn-copy" id="copyBtn">Copy</button>
          </div>
        </div>
        <p class="modal-msg">
          Take a screenshot now and send it via Instagram DM before the code expires!
        </p>
        <p class="modal-urgent">Code expires soon</p>
        <button type="button" class="btn-close" id="modalClose">Got it</button>
      </div>
    </div>

    <script src="/js/va-bootstrap.js" defer></script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="/js/app.js" defer></script>
  </body>
</html>
